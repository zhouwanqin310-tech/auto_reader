# 论文阅读助手配置文件

# MiniMax API 配置
miniMax:
  api_key: ""
  base_url: "https://api.minimax.chat/v1"
  model: "MiniMax-M2.7"
  fallback_model: "MiniMax-Text-01"

# 本地存储路径
storage:
  base_dir: ""
  papers_dir: "papers"
  pdf_dir: "pdfs"
  cache_file: "paper_history.json"

# 推送设置
push:
  time: "09:00"
  min_papers: 3
  max_papers: 5
  check_interval_hours: 24

# 关注领域（可多选，逗号分隔）
fields:
  - "linguistics in AI"
  - "ai for linguistics"
  - "linguistic analysis with ai"
  - "corpus linguistics"
  - "corpus-based linguistics"
  - "corpus analysis"
  - "linguistic corpora"
  - "AI-assisted language learning"
  - "computer-assisted language learning"
  - "AI in language education"
  - "technology-enhanced language learning"
  - "language acquisition"
  - "second language acquisition"
  - "first language acquisition"
  - "computational phonology"
  - "phonological modeling"
  - "speech phonology"
  - "phonological analysis"
  - "semantic parsing"

# 筛选与匹配配置（用于“召回更全 + 精筛更准”，保留 AI 画像筛选）
filter:
  profile:
    # AI 画像（用于 ai_topic_matches_paper）
    # 说明：允许“CS/AI + 人文/社科/教育”交叉方向；把“纯模型/纯工程 benchmark”作为倾向于不匹配的情形。
    ai_match_persona: |
     

  thresholds:
    # 规则层（粗召回/精筛）阈值：低阈值用于“召回更全”，高阈值用于“减少 AI 浪费”
    rule_recall_min_score: 10
    rule_precision_min_score: 18
    # AI 置信度阈值：低于此阈值即使 matched 也更倾向拒绝（但会触发补救策略保证数量）
    ai_min_confidence: 0.6
    # 限制 AI 最多评估候选数量（避免成本失控）
    max_ai_candidates: 30
    # 每个 job 的 AI 调用上限（硬限制，超过则不再调用 AI）
    max_ai_calls_per_job: 100

# 搜索排序优先级
search_priority:
  - "relevance"
  - "published_date"
  - "citation_count"

# 输出语言设置
output:
  language: "chinese"
  include_english_terms: true
  save_pdf: true

# AI 主题匹配设置
ai_match:
  persona: |
   

# AI 摘要设置
ai_summary:
  include_abstract_translation: true
  include_section_analysis: true
  include_method_analysis: true
  include_conclusion_analysis: true
  include_critical_review: true
  include_similar_papers: true
  max_similar_papers: 3
